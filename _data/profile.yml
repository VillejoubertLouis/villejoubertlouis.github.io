# Three big research questions / themes. `figure_kind`: image | placeholder.
themes:
  - id: "perception"
    title: "What does the world sound like through a cochlear implant?"
    body: >
      A cochlear implant restores hearing by stimulating the auditory nerve directly
      with electrical pulses delivered through an electrode array surgically threaded
      into the cochlea. The result is functional speech understanding for hundreds of
      thousands of users worldwide — but the perceived sound is unlike normal acoustic
      hearing. Music can lose its colour, voices their identity, and noisy rooms become
      exhausting. My work asks how the signal-processing pipeline of an implant — from
      microphone to electrical pulse — shapes what users actually hear, and where there
      is room to do better.
    figure_kind: "placeholder"
    figure_label: "vocoder waveform / spectrogram"
    figure_caption: "Acoustic CI simulations isolate the perceptual cost of each coding choice."
  - id: "personal"
    title: "Does it sound the same to everyone — or is it personal?"
    body: >
      Every cochlea is a slightly different shape, and every electrode array sits in a
      slightly different place. The mapping between sound frequency and the nerves that
      end up stimulated is, in practice, a personal thing — set at fitting and rarely
      revisited. My thesis explores how frequency-to-place mismatch interacts with
      channel-selection and noise-reduction algorithms, and how listening tests can
      give clinicians the data they need to personalise these settings rather than
      leave them at factory defaults.
    figure_kind: "image"
    figure: "/images/medel-electrode-array-ezgif.com-crop.gif"
    figure_caption: "Animation of electrode-array insertion (Med-El)."
  - id: "wearable"
    title: "Can a smartwatch help you hear the world differently?"
    body: >
      Hearing assistance does not have to stop at the implant. Modern wearables —
      smartwatches, earbuds, phones — carry microphones, accelerometers, and growing
      on-device compute. They can act as a real-world layer on top of an implant:
      surfacing environmental sounds, supporting situational awareness, and giving
      users tools to characterise and tune their own hearing in everyday life — not
      just in the clinic.
    figure_kind: "placeholder"
    figure_label: "wearable concept"
    figure_caption: "A wearable companion for personalised everyday listening."

