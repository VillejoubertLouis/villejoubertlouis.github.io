  - "I study how people hear through <strong>cochlear implants</strong> — and how psychoacoustics, signal processing, and human-centred design can make implanted hearing clearer, more natural, and more personal."
  - "My work sits at the intersection of <strong>auditory neuroscience</strong>, <strong>audiology</strong>, <strong>signal processing</strong>, and <strong>human–computer interaction</strong>. I run psychophysical experiments — in the lab and online — and build software for adaptive listening tests and sound-coding evaluation."

